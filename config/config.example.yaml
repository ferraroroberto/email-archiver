# Email Archiver Configuration
# Copy this file to config.yaml and set archive.root_paths to your OneDrive archive root(s).
#
#   copy config\config.example.yaml config\config.yaml
#
# Then edit config/config.yaml and set archive.root_paths.

archive:
  # List of absolute paths to your email archive roots (OneDrive local sync folders)
  root_paths:
    - "C:/Users/YourName/OneDrive/Documentos/"
    - "C:/Users/YourName/OneDrive/Archive/"

database:
  # Path relative to the project root or absolute
  path: "data/emails.db"

scanning:
  batch_size: 500
  body_preview_length: 500

path:
  # Maximum path length (chars) honoured by BOTH the scanner (skips existing
  # paths longer than this) and the archiver (shortens filenames so the path it
  # writes never overflows). Windows MAX_PATH is 260 incl. the terminating NUL;
  # 255 leaves headroom for the OS, COM marshalling, and long-path prefixes.
  max_length: 255

suggestion:
  max_suggestions: 3
  min_score: 0.05

ui:
  window_width: 1100
  window_height: 560
  font_family: "Segoe UI"
  font_size_normal: 10
  font_size_title: 13

logging:
  level: "INFO"
  file: "logs/archiver.log"
